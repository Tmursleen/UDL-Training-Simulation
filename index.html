<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>A Day in Katie's Shoes — UDL Training Simulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,500;1,600&family=Poppins:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2118;
    --ink-soft:#6E6459;
    --panel:#FFFFFF;
    --panel-2:#F3EDDE;
    --gold:#A6895B;
    --gold-dark:#8A6F45;
    --brown:#3B2E22;
    --brown-soft:#6B5540;
    --rust:#B5652E;
    --mustard:#C9A227;
    --sage:#6E8F6B;
    --sage-dark:#4F6F52;
    --clay:#B85C4A;
    --clay-dark:#8F4636;
    --line:#E3D9C2;
    --bg:#F4EEE0;
    --app-height:100dvh;
    --nav-h:64px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Poppins',sans-serif;
    color:var(--ink);
    width:100vw;
    overflow:hidden;
    background:var(--bg);
  }

  .app-shell{
    display:flex;
    flex-direction:column;
    height:var(--app-height);
    min-height:280px;
    width:100%;
    max-width:1280px;
    margin:0 auto;
    background:var(--panel);
    overflow:hidden;
  }

  /* TOP BAR */
  .top-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:clamp(8px,1.6vh,14px) clamp(14px,2.5vw,24px);
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
    row-gap:6px;
    flex-shrink:0;
  }
  .brand{min-width:0;}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold-dark);
    font-weight:600;
    margin-bottom:2px;
  }
  h1,h2{margin:0;}
  h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(16px,2.1vw,24px);
    font-weight:800;
    line-height:1.1;
    color:var(--ink);
  }
  .hud-inline{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .meter-label{font-family:'Playfair Display',serif;font-weight:700;font-size:12.5px;white-space:nowrap;}
  .gauge{
    width:120px; height:11px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:99px;
    overflow:hidden;
  }
  .gauge-fill{
    height:100%; width:50%;
    background:linear-gradient(90deg,var(--brown),var(--gold));
    border-radius:99px;
    transition:width .5s cubic-bezier(.4,0,.2,1), background .3s ease;
  }
  .gauge-fill.low{background:linear-gradient(90deg,#7A3A2C,var(--clay));}
  .gauge-fill.high{background:linear-gradient(90deg,#3E5940,var(--sage));}
  .gauge-num{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;min-width:24px;text-align:right;}
  .badges{display:flex;gap:6px;flex-wrap:wrap;}
  .badge{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;
    background:var(--brown); color:#FBF6EA; padding:3px 8px;
    border-radius:99px; font-weight:600; white-space:nowrap;
  }

  /* TABS / PAGE NAV */
  .tabs{
    display:flex; gap:8px; padding:clamp(6px,1.2vh,10px) clamp(14px,2.5vw,24px);
    border-bottom:1px solid var(--line);
    overflow-x:auto;
    flex-shrink:0;
    -ms-overflow-style:none; scrollbar-width:thin;
  }
  .tab{
    flex:0 0 auto; min-width:104px;
    background:var(--panel-2);
    border:2px solid var(--line);
    border-radius:13px;
    padding:6px 11px;
    cursor:pointer;
    transition:all .2s ease;
    text-align:left;
  }
  .tab:disabled{cursor:not-allowed;opacity:.45;}
  .tab .tnum{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--ink-soft);letter-spacing:.06em;}
  .tab .tname{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;margin-top:0;}
  .tab.active{border-color:var(--gold);background:#F3E9D2;}
  .tab.done .tnum::after{content:" ✓";color:var(--sage);}

  /* SLIDER */
  .slider-viewport{
    position:relative;
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }
  .slider-track{
    display:flex;
    height:100%;
    transition:transform .45s cubic-bezier(.65,0,.35,1);
  }
  .screen{
    flex:0 0 100%;
    width:100%;
    height:100%;
    overflow-y:auto;
    padding:clamp(12px,2.2vh,22px) clamp(14px,2.6vw,26px);
  }
  .slide-grid{
    display:grid;
    grid-template-columns:1fr 240px;
    gap:20px;
    align-items:start;
  }
  @media(max-width:720px){ .slide-grid{grid-template-columns:1fr;} }
  @media(max-height:560px){ .slide-grid{grid-template-columns:1fr 190px;} }

  .nav-arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:36px; height:36px; border-radius:50%;
    border:1px solid var(--line);
    background:rgba(255,255,255,.92);
    color:var(--ink);
    font-size:16px; line-height:1;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 16px rgba(43,33,24,.14);
    z-index:5;
    transition:opacity .15s ease, transform .15s ease;
  }
  .nav-arrow:hover:not(:disabled){transform:translateY(-50%) scale(1.06);}
  .nav-arrow:disabled{opacity:0; pointer-events:none;}
  .nav-arrow.prev{left:8px;}
  .nav-arrow.next{right:8px;}

  /* STAGE CONTENT */
  .stage h2{font-family:'Playfair Display',serif;font-size:18px;margin:0 0 6px;}
  .scenario{color:var(--ink-soft);font-size:13px;line-height:1.6;margin-bottom:12px;}
  .board{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:560px){.board{grid-template-columns:1fr;}}
  .col-title{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:6px;
  }
  .pool, .dropzone{
    background:var(--panel-2);
    border:2px dashed var(--line);
    border-radius:15px;
    padding:9px;
    min-height:130px;
    display:flex; flex-direction:column; gap:6px;
  }
  .dropzone.dragover{border-color:var(--gold);background:#F3E9D2;}
  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px 10px;
    font-size:12.5px;
    font-weight:500;
    cursor:grab;
    user-select:none; touch-action:none;
    display:flex; align-items:center; gap:8px;
    box-shadow:0 1px 2px rgba(43,33,24,.06);
    transition:box-shadow .15s ease;
  }
  .card:active{cursor:grabbing;}
  .card.dragging{opacity:.35;}
  .card.placed-good{border-color:var(--sage);background:#EAF1E6;}
  .card.placed-bad{border-color:var(--clay);background:#F8E9E4;}
  .card.readonly{cursor:default;}
  .card .emo{font-size:14px;}
  .drag-ghost{
    position:fixed; pointer-events:none; z-index:999;
    background:#fff; border:1px solid var(--gold); border-radius:14px;
    padding:9px 11px; font-size:13px; font-weight:500;
    box-shadow:0 8px 20px rgba(43,33,24,.2);
    display:flex; align-items:center; gap:8px;
  }
  .hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .toast{font-size:10.5px;font-weight:600;padding:4px 8px;border-radius:8px;margin-top:2px;display:inline-block;}
  .toast.good{background:#EAF1E6;color:#3E5940;}
  .toast.bad{background:#F8E9E4;color:var(--clay);}

  .actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  button{font-family:'Poppins',sans-serif;}
  button.ghost{
    font-weight:600; font-size:11.5px;
    background:transparent; color:var(--ink-soft); border:1px solid var(--line);
    border-radius:99px; padding:9px 15px; cursor:pointer;
  }
  button.ghost:hover{border-color:var(--gold);color:var(--ink);}
  .locked-note{
    display:flex; align-items:center; justify-content:center; height:100%;
    color:var(--ink-soft); font-size:14px; text-align:center; padding:30px;
  }

  /* FEEDBACK SCREEN */
  .feedback-screen{display:flex; align-items:flex-start; justify-content:center; min-height:100%;}
  .feedback-wrap{max-width:760px; width:100%; margin:0 auto;}
  .fb-header{text-align:center; margin-bottom:14px;}
  .fb-header .eyebrow{display:block;margin-bottom:4px;}
  .fb-header h2{font-family:'Playfair Display',serif;font-size:20px;}
  .fb-grid{display:grid; grid-template-columns:1fr 200px; gap:18px; align-items:start;}
  @media(max-width:640px){.fb-grid{grid-template-columns:1fr;}}
  .fb-block{border-radius:14px;padding:12px 14px;margin-bottom:10px;}
  .fb-outcome{background:#EAF1E6;border:1px solid var(--sage);}
  .fb-theory{background:var(--panel-2);border:1px solid var(--line);}
  .fb-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:5px;color:var(--ink-soft);}
  .fb-body{font-size:13px;line-height:1.6;}
  .fb-ref{font-size:11px;color:var(--ink-soft);margin-top:7px;font-style:italic;}
  .fb-tally{margin-top:8px;font-weight:600;font-size:13px;}

  /* INTRO SCREEN */
  .intro-screen{display:flex; align-items:center; justify-content:center; min-height:100%;}
  .intro-inner{max-width:760px; width:100%; text-align:center;}
  .intro-eyebrow{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--gold-dark); font-weight:600; margin-bottom:8px;
  }
  .intro-title{font-family:'Playfair Display',serif; font-size:clamp(20px,3.4vw,30px); font-weight:800; margin-bottom:14px;}
  .intro-katie-wrap{width:110px;margin:0 auto 12px;}
  .intro-katie-wrap svg{width:100%;display:block;}
  .intro-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; text-align:left; margin-top:6px;}
  @media(max-width:680px){.intro-grid{grid-template-columns:1fr;}}
  .intro-card{
    background:var(--panel-2); border:1px solid var(--line); border-radius:16px;
    padding:14px 14px;
  }
  .intro-card-label{
    font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.09em;
    text-transform:uppercase; color:var(--gold-dark); font-weight:700; margin-bottom:6px;
  }
  .intro-card-body{font-size:12.5px; line-height:1.55; color:var(--ink);}

  .end-screen-wrap{display:flex;align-items:center;justify-content:center;min-height:100%;}
  .end-screen{text-align:center;padding:16px;max-width:520px;}
  .end-screen h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:10px;}
  .end-screen p{color:var(--ink-soft);margin:0 auto 14px;line-height:1.6;font-size:13.5px;}

  /* KATIE PANEL (in interaction screen) */
  .katie-panel{
    background:linear-gradient(160deg, var(--brown), var(--gold) 60%, var(--rust));
    border-radius:20px;
    padding:14px 12px;
    display:flex; flex-direction:column; align-items:center;
    color:#fff;
  }
  .katie-day{
    font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    background:rgba(255,255,255,.18);
    padding:4px 10px; border-radius:99px; margin-bottom:9px;
  }
  .katie-svg-wrap{width:100%;max-width:150px;margin-bottom:9px;}
  .katie-svg-wrap svg{width:100%;height:auto;display:block;}
  .speech{
    background:#fff; color:var(--ink);
    border-radius:14px; padding:9px 11px;
    font-size:12px; font-weight:500; line-height:1.4;
    position:relative; text-align:center;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
  }
  .speech::before{
    content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%);
    border-left:8px solid transparent; border-right:8px solid transparent; border-bottom:8px solid #fff;
  }
  .katie-name{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;margin-top:10px;}
  @media(max-height:560px){
    .katie-svg-wrap{max-width:100px;}
    .katie-day, .katie-name{display:none;}
    .katie-panel{padding:10px 8px;}
  }

  /* PERSISTENT BOTTOM NAV */
  .bottom-nav{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px clamp(14px,2.5vw,24px);
    padding-bottom:max(10px, env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
    background:var(--panel);
    min-height:var(--nav-h);
  }
  .nav-btn{
    font-weight:600; font-size:12.5px; letter-spacing:.01em;
    border-radius:99px; padding:10px 16px; cursor:pointer; border:none;
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .nav-btn.icon-only{padding:10px 12px;}
  .nav-btn.ghost{background:var(--panel-2); color:var(--ink-soft); border:1px solid var(--line);}
  .nav-btn.ghost:disabled{opacity:.4; cursor:not-allowed;}
  .nav-btn.ghost:hover:not(:disabled){color:var(--ink); border-color:var(--gold);}
  .nav-btn.primary{
    background:var(--brown); color:#FBF6EA;
    text-transform:uppercase; font-size:12px;
    box-shadow:0 8px 18px rgba(59,46,34,.28);
    transition:background .15s ease, transform .1s ease;
    margin-left:auto;
  }
  .nav-btn.primary:hover:not(:disabled){background:var(--ink);}
  .nav-btn.primary:active:not(:disabled){transform:translateY(1px);}
  .nav-btn.primary:disabled{background:#DCD3BF;box-shadow:none;cursor:not-allowed;color:#8f8574;}
  .nav-progress{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-soft);
    white-space:nowrap; display:none;
  }
  @media(min-width:560px){ .nav-progress{display:inline-flex;} }

  @media(max-height:420px){
    :root{--nav-h:52px;}
    .nav-btn{padding:7px 12px;font-size:11px;}
    .top-bar{display:none;}
  }

  a:focus-visible, button:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--gold-dark); outline-offset:2px;
  }
</style>
</head>
<body>
<div class="app-shell" id="appShell">
  <div class="top-bar">
    <div class="brand">
      <div class="eyebrow">UDL Training Simulation</div>
      <h1>A Day in Katie's Shoes</h1>
    </div>
    <div class="hud-inline">
      <div class="meter-label" id="meterLabel">Engagement Meter</div>
      <div class="gauge"><div class="gauge-fill" id="gaugeFill" style="width:50%"></div></div>
      <div class="gauge-num" id="gaugeNum">50</div>
      <div class="badges" id="badges"></div>
    </div>
  </div>

  <div class="tabs" id="tabs" role="tablist" aria-label="Training days"></div>

  <div class="slider-viewport">
    <button class="nav-arrow prev" id="prevArrow" aria-label="Previous screen">‹</button>
    <div class="slider-track" id="track"></div>
    <button class="nav-arrow next" id="nextArrow" aria-label="Next screen">›</button>
  </div>

  <div class="bottom-nav" role="navigation" aria-label="Simulation navigation">
    <button class="nav-btn ghost icon-only" id="navPrev" aria-label="Back">‹ Back</button>
    <button class="nav-btn ghost icon-only" id="navNext" aria-label="Next">Next ›</button>
    <div class="nav-progress" id="navProgress"></div>
    <button class="nav-btn primary" id="navPrimary">Start</button>
  </div>
</div>

<script>
/* ---------- DATA ---------- */
const GOOD_DELTA = 6;
const BAD_DELTA = -7;

const DAYS = [
  {
    id:1, name:"Cybersecurity", meterLabel:"Engagement Meter",
    title:"Day 1 — Mandatory Cybersecurity Training",
    objective:"Learn how chunking, pacing, and learner control shape sustained engagement.",
    focus:"Watch how the Engagement Meter reacts as you add or remove each strategy.",
    scenario:"Katie's course is a 45-minute lecture: one long video, no breaks, no interaction. She's already losing focus. Drag in strategies that will actually help — a few options here will do more harm than good.",
    poolTitle:"Available Strategies", zoneTitle:"Katie's Support Plan",
    items:[
      {label:"Break the lesson into 5-minute modules", emo:"•", good:true, fb:"Shorter chunks reduce the demand on working memory and give Katie natural points to reset her focus."},
      {label:"Add progress bars", emo:"•", good:true, fb:"Visible progress gives Katie a sense of momentum and control over the task."},
      {label:"Include interactive challenges", emo:"•", good:true, fb:"Active tasks keep attention engaged far better than passive watching."},
      {label:"Allow Katie to choose the learning order", emo:"•", good:true, fb:"Choice increases autonomy and buy-in — a core UDL principle."},
      {label:"Add real workplace scenarios", emo:"•", good:true, fb:"Relevance to her actual job makes the content easier to care about and remember."},
      {label:"Require one uninterrupted sitting", emo:"•", good:false, fb:"Long unbroken sessions are exactly where sustained attention breaks down for Katie."},
      {label:"Remove pause buttons", emo:"•", good:false, fb:"Taking away control over pacing removes one of Katie's few coping tools."},
      {label:"Long blocks of text", emo:"•", good:false, fb:"Dense uninterrupted text is a heavy working-memory load with no visual relief."}
    ],
    outcome:"Katie earns points, badges, and immediate feedback for completing learning tasks. Positive reinforcement increases motivation and encourages her to keep engaging with the content.",
    theory:"Behaviourism emphasizes that learning is strengthened through reinforcement. Gamification elements such as rewards, progress bars, and instant feedback encourage persistence and sustained participation. Hamari, Koivisto, and Sarsa found that points, badges, and progress indicators often increase learner motivation and engagement.",
    ref:"Hamari, J., Koivisto, J., & Sarsa, H. (2014). Does gamification work? A literature review of empirical studies on gamification. Proceedings of the 47th Hawaii International Conference on System Sciences, 3025–3034.",
    badge:"Engagement +",
    shirt:"#6E8F6B", prop:"laptop",
    speech:{good:"The bite-sized videos are actually keeping me hooked!", bad:"I've completely lost track of what this video is even about..."}
  },
  {
    id:2, name:"The Process", meterLabel:"Understanding Meter",
    title:"Day 2 — Understanding a Complicated Process",
    objective:"Explore how multiple means of representation reduce cognitive overload.",
    focus:"Notice how combining formats — visual, audio, hands-on — changes comprehension.",
    scenario:"Katie has to learn a complicated software process from a 20-page PDF: technical language, no visuals. She's overwhelmed. Build Katie's Learning Toolkit — a couple of these resources will just add to the overload.",
    poolTitle:"Available Resources", zoneTitle:"Katie's Learning Toolkit",
    items:[
      {label:"Video demonstration", emo:"📹", good:true, fb:"Seeing the process performed makes each step concrete."},
      {label:"Infographic", emo:"🖼️", good:true, fb:"A visual summary reduces the load of holding steps in memory."},
      {label:"Audio explanation", emo:"🎧", good:true, fb:"A second channel of input reinforces the material without adding visual clutter."},
      {label:"Step-by-step checklist", emo:"📋", good:true, fb:"Breaking the process into checkable steps supports working memory directly."},
      {label:"Interactive software simulation", emo:"🖥️", good:true, fb:"Practicing the real interface builds procedural understanding, not just recognition."},
      {label:"Long technical manual", emo:"📖", good:false, fb:"Dense unstructured text with no visuals is the exact overload Katie started with."},
      {label:"Video with no captions or transcript", emo:"🔇", good:false, fb:"Without captions or a transcript, this resource creates a new barrier instead of removing one."}
    ],
    outcome:"Katie processes information more effectively when it's organized into smaller chunks and presented through visuals, audio, demonstrations, and written supports. Offering multiple representations reduces working memory demands and supports knowledge construction.",
    theory:"Cognitivism focuses on how learners receive, organize, and store information in memory. Well-designed instruction reduces unnecessary cognitive load and improves comprehension. Mayer's Cognitive Theory of Multimedia Learning demonstrates that combining words and visuals promotes deeper understanding than text alone.",
    ref:"Mayer, R. E. (2021). Multimedia Learning (3rd ed.). Cambridge University Press.",
    badge:"Understanding +",
    shirt:"#3B2E22", prop:"books",
    speech:{good:"These visuals are finally making this click!", bad:"This manual is just a wall of text... I'm lost."}
  },
  {
    id:3, name:"Showcase", meterLabel:"Confidence Meter",
    title:"Day 3 — Showcase Katie's Knowledge",
    objective:"Practice designing authentic, flexible ways for learners to demonstrate mastery.",
    focus:"Think about what actually proves someone can do the job, not just recall facts.",
    scenario:"Katie understands the material — now she has to prove it. Choose ways for her to demonstrate her learning. A couple of these methods work against everything you've built so far.",
    poolTitle:"Assessment Options", zoneTitle:"Katie's Assessment Plan",
    items:[
      {label:"Complete a simulation", emo:"🎮", good:true, fb:"Performing the task in context proves applied understanding."},
      {label:"Explain the process verbally", emo:"💬", good:true, fb:"Talking it through lets Katie demonstrate understanding without a writing barrier."},
      {label:"Solve a workplace scenario", emo:"🧩", good:true, fb:"Authentic problems show she can transfer knowledge, not just recall it."},
      {label:"Build a workflow", emo:"📊", good:true, fb:"Constructing the process herself is strong evidence of real understanding."},
      {label:"Demonstrate to a coworker", emo:"👥", good:true, fb:"Teaching someone else is one of the clearest signs of mastery."},
      {label:"Give a written multiple-choice test only", emo:"📝", good:false, fb:"A single written format doesn't let Katie show what she actually knows how to do."},
      {label:"Require her to recite a memorized script", emo:"🗒️", good:false, fb:"Memorization tests recall, not understanding — it isn't authentic to the real task."}
    ],
    outcome:"Katie demonstrates learning by solving authentic workplace problems rather than completing only traditional written tests. She actively applies knowledge through simulations, scenarios, and collaborative activities.",
    theory:"Constructivism suggests that learners build knowledge through authentic experiences, reflection, and problem-solving. Flexible assessments let learners demonstrate meaningful understanding in contexts similar to their workplace. Jonassen argues that authentic tasks and real-world problem solving promote deeper learning than rote memorization.",
    ref:"Jonassen, D. H. (1999). Designing constructivist learning environments. In C. M. Reigeluth (Ed.), Instructional-design theories and models: A new paradigm of instructional theory (Vol. II, pp. 215–239).",
    badge:"Confidence ★",
    shirt:"#A6895B", prop:"star",
    speech:{good:"I actually feel ready to show what I know!", bad:"A written test? I don't think this proves I understand it."}
  },
  {
    id:4, name:"Redesign", meterLabel:"Inclusion Meter",
    title:"Day 4 — Redesign Katie's Training Course",
    objective:"Apply everything you've learned to redesign a full course using UDL.",
    focus:"Watch for design choices that quietly recreate the barriers Katie ran into this week.",
    scenario:"One last course still needs a redesign. Drag in the features that align with UDL — and leave out anything that recreates the barriers Katie ran into this week.",
    poolTitle:"Design Features", zoneTitle:"Redesigned Course",
    items:[
      {label:"Chunk content", emo:"•", good:true, fb:"Smaller units keep cognitive load manageable throughout."},
      {label:"Add captions", emo:"•", good:true, fb:"Captions support multiple means of representation for all learners."},
      {label:"Provide simulations", emo:"•", good:true, fb:"Hands-on practice builds real procedural skill."},
      {label:"Include reflection", emo:"•", good:true, fb:"Reflection consolidates learning and builds self-awareness."},
      {label:"Offer learner choice", emo:"•", good:true, fb:"Choice increases motivation and ownership of the learning path."},
      {label:"Build in checkpoints", emo:"•", good:true, fb:"Checkpoints let learners track progress and re-engage after a break."},
      {label:"Allow flexible assessments", emo:"•", good:true, fb:"Multiple ways to demonstrate learning removes unnecessary barriers."},
      {label:"One long final exam", emo:"•", good:false, fb:"This recreates the exact single-format, high-stakes barrier Katie struggled with."},
      {label:"No feedback until the very end", emo:"•", good:false, fb:"Without checkpoints along the way, Katie has no chance to self-correct or stay motivated."}
    ],
    outcome:"You've integrated UDL principles to create an inclusive workplace learning experience that supports diverse learners. Katie has successfully completed her training.",
    theory:"Bandura emphasized that people learn through observation, modeling, feedback, and developing self-efficacy. Seeing Katie succeed after effective design decisions encourages learners to adopt similar practices in their own instructional design.",
    ref:"Bandura, A. (1977). Social Learning Theory. Prentice Hall.",
    badge:"Course Complete 🎓",
    shirt:"#C9A227", prop:"cap",
    speech:{good:"This course actually works with how my brain works!", bad:"Without breaks or choice, I can already feel myself checking out."}
  }
];

/* ---------- SCREEN MAP ---------- */
/* Each day expands to [intro, interact, feedback]; a final end screen closes the flow. */
const SCREENS = [];
DAYS.forEach((d,i)=>{
  SCREENS.push({type:'intro', dayIndex:i});
  SCREENS.push({type:'interact', dayIndex:i});
  SCREENS.push({type:'feedback', dayIndex:i});
});
SCREENS.push({type:'end'});
const END_INDEX = SCREENS.length - 1;

function introIdx(dayIndex){ return dayIndex*3; }
function interactIdx(dayIndex){ return dayIndex*3+1; }
function feedbackIdx(dayIndex){ return dayIndex*3+2; }

/* ---------- KATIE SVG ---------- */

      <rect x="112" y="94" width="58" height="6" rx="3" fill="#2B2118"/>`;
  }
  if(prop==="books"){
    return `<rect x="112" y="82" width="56" height="12" rx="3" fill="#C9A227"/>
      <rect x="116" y="70" width="48" height="12" rx="3" fill="#6E8F6B"/>
      <rect x="120" y="58" width="40" height="12" rx="3" fill="#A6895B"/>
      <circle cx="150" cy="44" r="9" fill="#fff" stroke="#2B2118" stroke-width="2"/>

function faceMarkup(mood){

    return `<circle cx="63" cy="128" r="4" fill="#2B2118"/>

      <path d="M82 114 Q87 111 90 116" stroke="#2B2118" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <circle cx="54" cy="136" r="5" fill="#D9A98F" opacity=".7"/>

  }

    <path d="M80 116 Q87 119 92 113" stroke="#2B2118" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M62 148 Q68 143 75 147 Q82 143 88 148" stroke="#2B2118" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M100 108 q6 8 0 16" stroke="#B5652E" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>`;
}

function katieSVG(day, mood){
  return `<svg viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of Katie">
    <ellipse cx="75" cy="196" rx="55" ry="10" fill="rgba(0,0,0,.12)"/>
    <path d="M40 205 Q40 150 75 150 Q110 150 110 205 Z" fill="${day.shirt}"/>
    <circle cx="75" cy="120" r="42" fill="#F2C29B"/>
    <path d="M33 118 Q30 75 75 70 Q120 75 117 118 Q117 90 75 88 Q33 90 33 118 Z" fill="#4A3728"/>
    ${propMarkup(day.prop)}
    ${faceMarkup(mood)}
  </svg>`;
}

/* ---------- STATE ---------- */
function freshState(){
  const unlocked = new Array(SCREENS.length).fill(false);
  unlocked[0] = true;
  return {
    current: 0,
    meter: 50,
    unlocked,
    completed: [false,false,false,false],
    badges: [],
    dayPlacements: {},
    dayContribution: {}
  };
}
let state = freshState();

const tabsEl = document.getElementById('tabs');
const trackEl = document.getElementById('track');
const gaugeFill = document.getElementById('gaugeFill');
const gaugeNum = document.getElementById('gaugeNum');
const meterLabel = document.getElementById('meterLabel');
const badgesEl = document.getElementById('badges');
const prevArrow = document.getElementById('prevArrow');
const nextArrow = document.getElementById('nextArrow');
const navPrev = document.getElementById('navPrev');
const navNext = document.getElementById('navNext');
const navPrimary = document.getElementById('navPrimary');
const navProgress = document.getElementById('navProgress');

let dragged = null;
let ghost = null;

/* ---------- NAVIGATION ---------- */
function goTo(idx){
  if(idx < 0 || idx >= SCREENS.length) return;
  if(!state.unlocked[idx]) return;
  state.current = idx;
  renderAll();
}

function startDay(dayIndex){
  const idx = interactIdx(dayIndex);
  state.unlocked[idx] = true;
  goTo(idx);
}

function submitDay(dayIndex){
  state.completed[dayIndex] = true;
  const d = DAYS[dayIndex];
  if(!state.badges.includes(d.badge)) state.badges.push(d.badge);
  const idx = feedbackIdx(dayIndex);
  state.unlocked[idx] = true;
  goTo(idx);
}

function continueFromFeedback(dayIndex){
  if(dayIndex === DAYS.length - 1){
    state.unlocked[END_INDEX] = true;
    goTo(END_INDEX);
  } else {
    const idx = introIdx(dayIndex+1);
    state.unlocked[idx] = true;
    goTo(idx);
  }
}

function lastUnlockedInDay(dayIndex){
  const candidates = [feedbackIdx(dayIndex), interactIdx(dayIndex), introIdx(dayIndex)];
  for(const c of candidates){ if(state.unlocked[c]) return c; }
  return introIdx(dayIndex);
}

prevArrow.onclick = ()=> goTo(state.current - 1);
nextArrow.onclick = ()=>{ if(state.unlocked[state.current+1]) goTo(state.current+1); };
navPrev.onclick = ()=> goTo(state.current - 1);
navNext.onclick = ()=>{ if(state.unlocked[state.current+1]) goTo(state.current+1); };

/* ---------- RENDER: TABS ---------- */
function renderTabs(){
  tabsEl.innerHTML = '';
  const screen = SCREENS[state.current];
  const activeDay = screen.type === 'end' ? -1 : screen.dayIndex;
  DAYS.forEach((d,i)=>{
    const btn = document.createElement('button');
    const unlocked = state.unlocked[introIdx(i)];
    btn.className = 'tab' + (activeDay===i?' active':'') + (state.completed[i]?' done':'');
    btn.disabled = !unlocked;
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-selected', activeDay===i ? 'true' : 'false');
    btn.innerHTML = `<div class="tnum">Day ${d.id}</div><div class="tname">${d.name}</div>`;
    btn.onclick = ()=> goTo(lastUnlockedInDay(i));
    tabsEl.appendChild(btn);
  });
}

/* ---------- RENDER: HUD ---------- */
function renderHUD(){
  const screen = SCREENS[state.current];
  const dayIndex = screen.type === 'end' ? DAYS.length-1 : screen.dayIndex;
  const d = DAYS[dayIndex];
  meterLabel.textContent = d.meterLabel;
  const pct = Math.max(0, Math.min(100, state.meter));
  gaugeFill.style.width = pct + '%';
  gaugeFill.classList.remove('low','high');
  if(pct < 35) gaugeFill.classList.add('low');
  else if(pct > 70) gaugeFill.classList.add('high');
  gaugeNum.textContent = Math.round(pct);
  badgesEl.innerHTML = state.badges.map(b=>`<span class="badge">${b}</span>`).join('');
}

/* ---------- RENDER: BOTTOM NAV ---------- */
function renderBottomNav(){
  const screen = SCREENS[state.current];
  navPrev.disabled = state.current === 0;
  navNext.disabled = !state.unlocked[state.current+1];
  prevArrow.disabled = state.current === 0;
  nextArrow.disabled = !state.unlocked[state.current+1];

  navPrimary.disabled = false;
  navPrimary.onclick = null;

  if(screen.type === 'intro'){
    const d = DAYS[screen.dayIndex];
    navProgress.textContent = `Day ${d.id} of ${DAYS.length} · Introduction`;
    navPrimary.textContent = `Start Day ${d.id} ›`;
    navPrimary.onclick = ()=> startDay(screen.dayIndex);
  } else if(screen.type === 'interact'){
    const d = DAYS[screen.dayIndex];
    const completed = state.completed[screen.dayIndex];
    const placedCount = Object.keys(state.dayPlacements[screen.dayIndex] || {}).length;
    navProgress.textContent = `Day ${d.id} of ${DAYS.length} · Interaction`;
    if(completed){
      navPrimary.textContent = 'View Results ›';
      navPrimary.onclick = ()=> goTo(feedbackIdx(screen.dayIndex));
    } else {
      navPrimary.textContent = 'Submit & See Results';
      navPrimary.disabled = placedCount === 0;
      navPrimary.onclick = ()=> submitDay(screen.dayIndex);
    }
  } else if(screen.type === 'feedback'){
    const d = DAYS[screen.dayIndex];
    const isLast = screen.dayIndex === DAYS.length - 1;
    navProgress.textContent = `Day ${d.id} of ${DAYS.length} · Reflection`;
    navPrimary.textContent = isLast ? 'Finish Training ›' : `Continue to Day ${d.id+1} ›`;
    navPrimary.onclick = ()=> continueFromFeedback(screen.dayIndex);
  } else {
    navProgress.textContent = 'Training complete';
    navPrimary.textContent = 'Play Again';
    navPrimary.onclick = ()=> restart();
    nextArrow.disabled = true;
    navNext.disabled = true;
  }
}

function restart(){
  state = freshState();
  renderAll();
}

/* ---------- RENDER: SLIDES ---------- */
function buildSlideShells(){
  trackEl.innerHTML = '';
  SCREENS.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'screen';
    el.id = 'screen-' + i;
    trackEl.appendChild(el);
  });
}

function katieMarkup(dayIndex, size){
  const d = DAYS[dayIndex];
  const mood = state.meter >= 50 ? 'good' : 'bad';
  if(size === 'small'){
    return `<div class="intro-katie-wrap">${katieSVG(d, mood)}</div>`;
  }
  return `
    <div class="katie-panel">
      <div class="katie-day">Day ${d.id}</div>
      <div class="katie-svg-wrap">${katieSVG(d, mood)}</div>
      <div class="speech">${d.speech[mood]}</div>
      <div class="katie-name">Katie</div>
    </div>`;
}

function renderIntroScreen(i, dayIndex){
  const el = document.getElementById('screen-' + i);
  const d = DAYS[dayIndex];
  el.innerHTML = `
    <div class="intro-screen">
      <div class="intro-inner">
        <div class="intro-eyebrow">Day ${d.id} of ${DAYS.length}</div>
        <h2 class="intro-title">${d.title}</h2>
        ${katieMarkup(dayIndex,'small')}
        <div class="intro-grid">
          <div class="intro-card">
            <div class="intro-card-label">Learning Objective</div>
            <div class="intro-card-body">${d.objective}</div>
          </div>
          <div class="intro-card">
            <div class="intro-card-label">The Scenario</div>
            <div class="intro-card-body">${d.scenario}</div>
          </div>
          <div class="intro-card">
            <div class="intro-card-label">Pay Attention To</div>
            <div class="intro-card-body">${d.focus}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderInteractScreen(i, dayIndex){
  const el = document.getElementById('screen-' + i);
  const d = DAYS[dayIndex];
  const placements = state.dayPlacements[dayIndex] || {};
  const placedCount = Object.keys(placements).length;
  const isCompleted = state.completed[dayIndex];

  el.innerHTML = `
    <div class="slide-grid">
      <div class="stage">
        <h2>${d.title}</h2>
        <p class="scenario">${d.scenario}</p>
        <div class="board">
          <div>
            <div class="col-title">${d.poolTitle}</div>
            <div class="pool" id="pool-${dayIndex}"></div>
          </div>
          <div>
            <div class="col-title">${d.zoneTitle}</div>
            <div class="dropzone" id="dropzone-${dayIndex}"></div>
          </div>
        </div>
        <p class="hint">${isCompleted ? 'This day is complete — use View Results below, or Reset to try different choices.' : `Drag cards into ${d.zoneTitle}, then use Submit below when you're ready.`}</p>
        <div class="actions">
          ${isCompleted ? '<button class="ghost" id="resetBtn">Reset &amp; Try Again</button>' : (placedCount>0 ? '<button class="ghost" id="resetBtn">Reset Day</button>' : '')}
        </div>
      </div>
      ${katieMarkup(dayIndex)}
    </div>
  `;

  const pool = document.getElementById('pool-' + dayIndex);
  const dropzone = document.getElementById('dropzone-' + dayIndex);

  d.items.forEach((item,idx)=>{
    if(placements[idx]) return;
    pool.appendChild(makeCard(item, idx, dayIndex, isCompleted));
  });
  d.items.forEach((item,idx)=>{
    if(!placements[idx]) return;
    const c = makeCard(item, idx, dayIndex, true);
    c.classList.add(placements[idx]==='good' ? 'placed-good' : 'placed-bad');
    const toast = document.createElement('div');
    toast.className = 'toast ' + (placements[idx]==='good'?'good':'bad');
    toast.textContent = placements[idx]==='good' ? '+ helps Katie' : '– hurts Katie';
    c.appendChild(toast);
    dropzone.appendChild(c);
  });

  if(pool.children.length===0){
    pool.innerHTML = '<div class="hint">All cards placed.</div>';
  }
  if(dropzone.children.length===0){
    dropzone.innerHTML = '<div class="hint">Nothing placed yet.</div>';
  }

  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.onclick = ()=>{
    state.meter -= (state.dayContribution[dayIndex] || 0);
    state.dayContribution[dayIndex] = 0;
    state.dayPlacements[dayIndex] = {};
    state.completed[dayIndex] = false;
    renderAll();
  };
}

function renderFeedbackScreen(i, dayIndex){
  const el = document.getElementById('screen-' + i);
  const d = DAYS[dayIndex];
  const placements = state.dayPlacements[dayIndex] || {};
  const goodCount = Object.values(placements).filter(v=>v==='good').length;
  const badCount = Object.values(placements).filter(v=>v==='bad').length;

  el.innerHTML = `
    <div class="feedback-screen">
      <div class="feedback-wrap">
        <div class="fb-header">
          <span class="eyebrow">Day ${d.id} · Reflection</span>
          <h2>${d.title.split('—')[1] ? d.title.split('—')[1].trim() : d.title}</h2>
        </div>
        <div class="fb-grid">
          <div>
            <div class="fb-block fb-outcome">
              <div class="fb-title">Learning Outcome</div>
              <div class="fb-body">${d.outcome}</div>
              <div class="fb-tally">You chose ${goodCount} helpful strateg${goodCount===1?'y':'ies'}${badCount>0 ? ' and '+badCount+' that worked against Katie' : ''}.</div>
            </div>
            <div class="fb-block fb-theory">
              <div class="fb-title">Connection to Theory</div>
              <div class="fb-body">${d.theory}</div>
              <div class="fb-ref">${d.ref}</div>
            </div>
          </div>
          ${katieMarkup(dayIndex)}
        </div>
      </div>
    </div>
  `;
}

function renderEndScreen(i){
  const el = document.getElementById('screen-' + i);
  el.innerHTML = `
    <div class="end-screen-wrap">
      <div class="end-screen">
        <h2>🎓 Katie completed her training</h2>
        <p>Across four days, you applied Behaviourism, Cognitivism, Constructivism, and Social Learning Theory through Universal Design for Learning — turning a week that could have shut Katie out into one that let her succeed.</p>
        <div class="badges" style="justify-content:center;">${state.badges.map(b=>`<span class="badge">${b}</span>`).join('')}</div>
      </div>
    </div>
  `;
}

function makeCard(item, idx, dayIndex, disabled){
  const c = document.createElement('div');
  c.className = 'card' + (disabled ? ' readonly' : '');
  c.innerHTML = `<span class="emo">${item.emo}</span><span>${item.label}</span>`;
  if(!disabled){
    c.addEventListener('pointerdown', (e)=>startDrag(e, item, idx, c, dayIndex));
  }
  return c;
}

function startDrag(e, item, idx, cardEl, dayIndex){
  e.preventDefault();
  dragged = {item, idx, dayIndex};
  cardEl.classList.add('dragging');

  ghost = document.createElement('div');
  ghost.className = 'drag-ghost';
  ghost.innerHTML = `<span class="emo">${item.emo}</span><span>${item.label}</span>`;
  document.body.appendChild(ghost);
  moveGhost(e);

  function onMove(ev){ moveGhost(ev); highlightDropzone(ev, dayIndex); }
  function onUp(ev){
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    const dz = document.getElementById('dropzone-' + dayIndex);
    const rect = dz.getBoundingClientRect();
    const inside = ev.clientX>=rect.left && ev.clientX<=rect.right && ev.clientY>=rect.top && ev.clientY<=rect.bottom;
    dz.classList.remove('dragover');
    ghost.remove();
    cardEl.classList.remove('dragging');
    if(inside){ placeItem(dayIndex, idx, item); }
    dragged = null;
  }
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

function moveGhost(e){
  if(!ghost) return;
  ghost.style.left = (e.clientX+12) + 'px';
  ghost.style.top = (e.clientY+12) + 'px';
}
function highlightDropzone(e, dayIndex){
  const dz = document.getElementById('dropzone-' + dayIndex);
  const rect = dz.getBoundingClientRect();
  const inside = e.clientX>=rect.left && e.clientX<=rect.right && e.clientY>=rect.top && e.clientY<=rect.bottom;
  dz.classList.toggle('dragover', inside);
}

function placeItem(dayIndex, idx, item){
  if(!state.dayPlacements[dayIndex]) state.dayPlacements[dayIndex] = {};
  state.dayPlacements[dayIndex][idx] = item.good ? 'good' : 'bad';
  const delta = item.good ? GOOD_DELTA : BAD_DELTA;
  state.meter = Math.max(0, Math.min(100, state.meter + delta));
  state.dayContribution[dayIndex] = (state.dayContribution[dayIndex] || 0) + delta;
  renderAll();
}

/* ---------- NAV ARROW / TRACK POSITION ---------- */
function updateTrackPosition(){
  trackEl.style.transform = `translateX(-${state.current * 100}%)`;
}

/* ---------- MASTER RENDER ---------- */
function renderAll(){
  renderTabs();
  renderHUD();
  SCREENS.forEach((s,i)=>{
    if(s.type === 'intro') renderIntroScreen(i, s.dayIndex);
    else if(s.type === 'interact') renderInteractScreen(i, s.dayIndex);
    else if(s.type === 'feedback') renderFeedbackScreen(i, s.dayIndex);
    else renderEndScreen(i);
  });
  renderBottomNav();
  updateTrackPosition();
  notifyParentHeight();
}

/* ---------- RESPONSIVE / EMBED HEIGHT HANDLING ---------- */
function setAppHeight(){
  const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  document.documentElement.style.setProperty('--app-height', h + 'px');
}
function notifyParentHeight(){
  try{
    if(window.parent && window.parent !== window){
      const h = document.getElementById('appShell').scrollHeight;
      window.parent.postMessage({ type:'katie-sim-resize', height: h }, '*');
    }
  }catch(err){ /* cross-origin parent — ignore */ }
}

window.addEventListener('resize', ()=>{ setAppHeight(); });
window.addEventListener('orientationchange', ()=>{ setAppHeight(); });
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setAppHeight);
}
new ResizeObserver(()=> notifyParentHeight()).observe(document.getElementById('appShell'));

setAppHeight();
buildSlideShells();
renderAll();
</script>
</body>
